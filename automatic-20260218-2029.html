    <script>
        // 1. ファイル名からIDを取得
        const folderName = window.location.pathname.split("/").pop().replace(".html", "");

        // 2. 画像の自動セット
        for (let i = 1; i <= 10; i++) {
            const imgId = "watch-img-" + i;
            const imgElement = document.getElementById(imgId);
            if (imgElement) {
                imgElement.src = "images/" + folderName + "/a (" + i + ").JPG";
            }
        }

        // 3. 共通の説明文を表示する
        const captionElement = document.getElementById("common-caption");
        if (captionElement && typeof commonDescription !== 'undefined') {
            captionElement.innerHTML = commonDescription;
        }

       // 4. data.jsからリンクデータを読み込んでセット
        if (typeof commonRawData !== 'undefined') {
            const sections = commonRawData.split('>');
            const myDataStr = sections.find(s => s.trim().startsWith(folderName));

            if (myDataStr) {
                const lines = myDataStr.split('\n');
                const links = document.querySelectorAll('.ali-link');

                lines.forEach(line => {
                    if (line.startsWith('link')) {
                        const parts = line.split('｜');
                        if (parts.length >= 3) {
                            const linkKey = parts[0].trim();
                            const label = parts[1].trim();
                            const url = parts[2].trim();
                            
                            const linkIndex = parseInt(linkKey.replace('link', '')) - 1;

                            if (links[linkIndex] && url && url !== "") {
                                links[linkIndex].href = url;
                                links[linkIndex].textContent = label ? label : "ショップ詳細ページ " + (linkIndex + 1);
                                links[linkIndex].style.display = "block";
                            }
                        }
                    }
                });
            }
        }
    </script>
